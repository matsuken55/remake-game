<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dice Batch Grid</title>
  <link rel="stylesheet" href="./src/styles.css"/>
</head>
<body>
  <main class="app">
    <section class="hero compact-hero">
      <p class="eyebrow">4x4 Dice Batch Puzzle</p>
      <h1>Dice Batch Grid</h1>
    </section>

    <section class="status top-status" aria-label="スコア情報">
      <strong>Score: <span id="score">0</span></strong>
      <strong>High: <span id="highScore">0</span></strong>
      <strong class="mode-badge">MODE: <span id="modeLabel">NORMAL</span></strong>
      <strong>Jokerまで: <span id="jokerCountdown">400</span></strong>
      <p id="message"></p>
    </section>

    <section class="control-row">
      <button id="roll">ROLL</button>
      <div class="joker-panel">
        <h2>ジョーカー</h2>
        <section id="jokerWindow" class="jokers" aria-label="ジョーカーストック"></section>
      </div>
    </section>

    <section class="play-area">
      <div class="tray-panel">
        <h2>現在のバッチ</h2>
        <section id="tray" class="tray" aria-label="現在のバッチ"></section>
      </div>
      <div id="boardWrap" class="board-wrap">
        <section id="board" class="board" aria-label="4x4盤面"></section>
      </div>
    </section>

    <section class="actions">
      <button id="rules">役点数一覧</button>
      <button id="restart">リスタート</button>
      <button id="rankingButton">ランキング</button>
    </section>

    <section id="startScreen" class="overlay start-overlay" aria-hidden="false">
      <div class="game-over start-card">
        <h2>モード選択</h2>
        <p>Normalはジョーカー400ポイント、Easyは280ポイントで補給されます。</p>
        <div class="mode-select" role="radiogroup" aria-label="ゲームモード">
          <label><input type="radio" name="gameMode" value="normal" checked> Normal</label>
          <label><input type="radio" name="gameMode" value="easy"> Easy</label>
        </div>
        <button id="startGame" type="button">ゲーム開始</button>
      </div>
    </section>

    <section id="gameOver" class="overlay" hidden aria-hidden="true" style="display:none">
      <form id="rankForm" class="game-over">
        <h2>ゲームオーバー</h2>
        <p>名前を登録して端末内ランキングに保存します。</p>
        <input id="playerName" maxlength="12" placeholder="NAME"/>
        <button type="submit">登録</button>
        <button type="button" id="gameOverRestart">リスタート</button>
        <h3>ランキング</h3>
        <ol id="rankingList"></ol>
      </form>
    </section>

    <dialog id="rankingView">
      <h2>ランキング</h2>
      <p>端末内に保存されたランキングを閲覧できます。</p>
      <div class="ranking-tabs" role="group" aria-label="ランキングモード">
        <button id="rankingNormal" type="button">Normal</button>
        <button id="rankingEasy" type="button">Easy</button>
      </div>
      <ol id="rankingViewList"></ol>
      <button id="closeRankingView">閉じる</button>
    </dialog>

    <dialog id="scoreDialog">
      <h2>役点数一覧</h2>
      <div id="scoreExamples" class="score-examples"></div>
      <button id="closeRules">閉じる</button>
    </dialog>
  </main>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
