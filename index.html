<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Four Dice Grid</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">4x4 Dice Placement Puzzle</p>
        <h1>Four Dice Grid</h1>
        <p>4色×数字1〜4のサイコロを毎ターン4個ずつ配置し、20グループの役を狙うオリジナルパズルです。</p>
      </section>
      <section class="status">
        <button id="roll">ROLL</button>
        <strong>Score: <span id="score">0</span></strong>
        <p id="message"></p>
      </section>
      <section id="tray" class="tray" aria-label="今回の4つのサイコロ"></section>
      <section id="board" class="board" aria-label="4x4盤面"></section>
      <aside class="rules">
        <h2>役</h2>
        <p><strong>消える役:</strong> 同色同数字4個、同色1-4、4色同数字、4色1-4。</p>
        <p><strong>得点役:</strong> 色4個、数字4個、色2色x2個、数字2種類x2個、4色、数字1-4。</p>
        <p>ジョーカー（★）は任意の色・数字として扱います。</p>
        <h2>ログ</h2>
        <ul id="log"></ul>
      </aside>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
